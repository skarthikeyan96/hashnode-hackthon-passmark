
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="840" viewBox="0 0 1600 840">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071029"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="840" fill="url(#bg)"/>

  <!-- Decorative blurred blobs -->
  <g opacity="0.12" filter="url(#blur)">
    <ellipse cx="260" cy="180" rx="380" ry="220" fill="#06b6d4" />
    <ellipse cx="1350" cy="680" rx="460" ry="260" fill="#7c3aed" />
  </g>

  <!-- Left: mock app card -->
  <g transform="translate(80,120)">
    <rect x="0" y="0" rx="20" width="720" height="520" fill="#071022" opacity="0.98" />
    <rect x="16" y="16" rx="10" width="688" height="56" fill="#0b1220" />
    <!-- window dots -->
    <circle cx="40" cy="44" r="8" fill="#ef4444" />
    <circle cx="70" cy="44" r="8" fill="#f59e0b" />
    <circle cx="100" cy="44" r="8" fill="#10b981" />
    <!-- search / header -->
    <rect x="24" y="96" rx="8" width="640" height="40" fill="#071126" />
    <!-- content lines -->
    <rect x="24" y="150" rx="6" width="420" height="16" fill="#071126" />
    <rect x="24" y="174" rx="6" width="580" height="12" fill="#071126" />
    <rect x="24" y="192" rx="6" width="360" height="12" fill="#071126" />
    <!-- goal cards row -->
    <g transform="translate(24,220)">
      <rect x="0" y="0" rx="10" width="160" height="116" fill="#081223" />
      <rect x="184" y="0" rx="10" width="160" height="116" fill="#081223" />
      <rect x="368" y="0" rx="10" width="160" height="116" fill="#081223" />
      <rect x="552" y="0" rx="10" width="160" height="116" fill="#081223" />
    </g>
    <!-- hype action dot -->
    <circle cx="700" cy="492" r="12" fill="#fb923c" />
  </g>

  <!-- Right: text block -->
  <g transform="translate(840,160)">
    <text x="0" y="0" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="700" font-size="56" fill="#ffffff">
      Breaking StrideBoard
    </text>
    <text x="0" y="80" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" fill="#e6eef9">
      AI-powered regression testing with Passmark
    </text>

    <!-- small description box -->
    <rect x="-6" y="120" rx="10" width="520" height="146" fill="rgba(255,255,255,0.04)"/>
    <text x="12" y="154" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" fill="#d7e7ff">
      I pressure-tested a public web app during the Breaking Apps Hackathon to see
    </text>
    <text x="12" y="178" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" fill="#d7e7ff">
      how far natural-language regression with Passmark can go before needing
    </text>
    <text x="12" y="202" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" fill="#d7e7ff">
      deterministic fallbacks.
    </text>

    <!-- tags chips -->
    <g transform="translate(12,232)">
      <rect x="0" y="0" rx="14" width="120" height="34" fill="url(#accent)" opacity="0.95" />
      <text x="18" y="22" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" fill="#071029">Passmark</text>

      <rect x="140" y="0" rx="14" width="160" height="34" fill="#0ea5e9" opacity="0.85" />
      <text x="160" y="22" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" fill="#071029">Playwright + AI</text>

      <rect x="320" y="0" rx="14" width="140" height="34" fill="#7c3aed" opacity="0.85" />
      <text x="348" y="22" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14" fill="#fff">Breaking Apps</text>
    </g>
  </g>

  <!-- bottom-right small credit -->
  <text x="1200" y="800" font-family="Inter, Arial, Helvetica, sans-serif" font-size="12" fill="#bcd6ff" opacity="0.9">
    Hackathon case study · StrideBoard · Passmark · Playwright
  </text>
</svg>